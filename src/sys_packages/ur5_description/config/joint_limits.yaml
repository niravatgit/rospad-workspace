# UR5 joint limits — used by ros2_control and MoveIt2
# Values match the URDF and Universal Robots datasheet (UR5 e-Series)

joint_limits:
  shoulder_pan_joint:
    has_position_limits: true
    min_position: -6.2831853   # -2π rad
    max_position:  6.2831853   # +2π rad
    has_velocity_limits: true
    max_velocity: 3.15         # rad/s
    has_acceleration_limits: false
    has_effort_limits: true
    max_effort: 150.0          # N·m

  shoulder_lift_joint:
    has_position_limits: true
    min_position: -6.2831853
